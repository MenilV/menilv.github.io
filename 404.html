<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    var targetDomain = "https://menilvukovic.com";
    var path = window.location.pathname;

    // Split path to extract segments
    var segments = path.split('/').filter(Boolean);
    var lastSegment = segments[segments.length - 1];

    var newURL = targetDomain + "/";

    if (segments.length > 0) {
      // Known pages that map directly to the root
      var knownPages = ['about', 'contact', 'projects', 'blog'];
      if (knownPages.includes(lastSegment)) {
        newURL = targetDomain + "/" + lastSegment + "/";
      } else if (lastSegment) {
        // Assume it is an old blog post and map to the new Eleventy slug structure
        newURL = targetDomain + "/posts/" + lastSegment + "/";
      }
    }

    newURL += window.location.search + window.location.hash;
    window.location.replace(newURL);
  </script>
  <meta http-equiv="refresh" content="0; url=https://menilvukovic.com/">
</head>
<body>
  <p>Redirecting to <a id="redirect-link" href="https://menilvukovic.com/">menilvukovic.com</a>...</p>
  <script>
    document.getElementById("redirect-link").href = newURL;
  </script>
</body>
</html>
